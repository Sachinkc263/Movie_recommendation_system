# CineMatch — Hybrid Movie Recommendation System
# Configuration for the ML training + evaluation pipeline.
# The FastAPI backend reads model artifacts directly; it does not use this file.

project:
  name: "CineMatch — Hybrid Movie Recommendation System"
  version: "1.0.0"

# ── Data paths (relative to project root) ────────────────────────────────────
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"

  # MovieLens 25M (download: https://grouplens.org/datasets/movielens/25m/)
  movielens:
    movies:  "data/raw/movies.csv"
    ratings: "data/raw/ratings.csv"
    links:   "data/raw/links.csv"
    tags:    "data/raw/tags.csv"

  # TMDB supplemental metadata (Kaggle "TMDB 5000 Movie Dataset")
  tmdb:
    movies_metadata: "data/raw/movies_metadata.csv"
    credits:         "data/raw/credits.csv"
    keywords:        "data/raw/keywords.csv"

  # Processed files (generated by notebooks/02_data_preprocessing.ipynb)
  processed_movies:  "data/processed/movies_processed.csv"
  processed_ratings: "data/processed/ratings_processed.csv"
  movies_integrated: "data/processed/movies_integrated.csv"

# ── Model artifacts exported by scripts/train_and_export.py ──────────────────
models:
  artifacts_dir: "models/artifacts"
  svd_U:         "models/artifacts/svd_U.npy"
  svd_Vt:        "models/artifacts/svd_Vt.npy"
  svd_meta:      "models/artifacts/svd_meta.pkl"
  tfidf_matrix:  "models/artifacts/tfidf_matrix.npz"
  tfidf_meta:    "models/artifacts/tfidf_meta.pkl"
  popularity:    "models/popularity_scores.csv"

# ── Collaborative filtering (Centered TruncatedSVD) ──────────────────────────
collaborative:
  algorithm: "CenteredTruncatedSVD"
  n_components: 50            # chosen by val-RMSE grid search
  min_ratings: 3
  random_state: 42

# ── Content-based filtering (TF-IDF) ─────────────────────────────────────────
content:
  max_features: 10000
  stop_words: "english"
  ngram_range: [1, 2]
  min_df: 2
  max_df: 0.8
  genre_repeat: 3             # genres weighted 3× in feature soup

# ── Hybrid parameters ────────────────────────────────────────────────────────
hybrid:
  content_weight: 0.55
  collab_weight: 0.45
  cold_start_threshold: 3     # interactions before SVD fold-in activates

# ── Evaluation contract (must not change between runs) ───────────────────────
evaluation:
  split_method: "user_based"
  test_size: 0.2
  min_ratings_per_user: 5
  random_state: 42
  k: 10                       # FIXED — do not change mid-experiment
  relevance_threshold: 4.0    # FIXED — do not change mid-experiment
  n_eval_users: 100

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/training.log"

# ── Misc ──────────────────────────────────────────────────────────────────────
random_seed: 42
